name: Build Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: pty-t-linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: pty-t-linux-aarch64
            cross: true
          - os: ubuntu-latest
            target: aarch64-linux-android
            package: pty-t-termux-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: pty-t-windows-x86_64
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        if: runner.os != 'Windows'
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Configure Android linker
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          set -euo pipefail
          ndk="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [[ -z "$ndk" ]]; then
            sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
            ndk="$(find "$sdk/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          fi
          linker="$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          test -x "$linker"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$linker" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$linker" >> "$GITHUB_ENV"

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pkg="${{ matrix.package }}"
          mkdir -p "dist/${pkg}"
          cp "target/${{ matrix.target }}/release/ptytd" "dist/${pkg}/"
          cp "target/${{ matrix.target }}/release/ptyt" "dist/${pkg}/"
          cp README.md "dist/${pkg}/"
          cp README.zh-CN.md "dist/${pkg}/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "${{ matrix.package }}"
          New-Item -ItemType Directory -Force "dist/$pkg" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ptytd.exe" "dist/$pkg/"
          Copy-Item "target/${{ matrix.target }}/release/ptyt.exe" "dist/$pkg/"
          Copy-Item "README.md" "dist/$pkg/"
          Copy-Item "README.zh-CN.md" "dist/$pkg/"
          Compress-Archive -Path "dist/$pkg/*" -DestinationPath "dist/$pkg.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
